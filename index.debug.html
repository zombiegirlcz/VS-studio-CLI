<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUI Builder - Debug</title>
    <style>
        body {
            background: #111827;
            color: #e5e7eb;
            font-family: monospace;
            padding: 20px;
            margin: 0;
            line-height: 1.6;
        }
        h1 { color: #3b82f6; }
        .section { margin: 20px 0; padding: 15px; border-left: 3px solid #3b82f6; }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
        .info { color: #60a5fa; }
        code { background: #1f2937; padding: 2px 6px; border-radius: 3px; }
        button { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 4px; 
            cursor: pointer;
            margin: 5px;
            font-family: monospace;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <h1>🔧 TUI Builder - Debug Console</h1>
    
    <div class="section">
        <h2>📊 System Status</h2>
        <p>Checking app status...</p>
        <div id="status"></div>
    </div>

    <div class="section">
        <h2>🧹 Cache Cleanup</h2>
        <button onclick="clearCache()">Clear Browser Cache & Service Workers</button>
        <button onclick="location.href='http://localhost:5173/'">Reload Main App</button>
        <div id="cache-result"></div>
    </div>

    <div class="section">
        <h2>📝 Console Log</h2>
        <pre id="log-output" style="background: #1f2937; padding: 10px; border-radius: 4px; max-height: 300px; overflow-y: auto;"></pre>
    </div>

    <script>
        const logOutput = document.getElementById('log-output');
        const logs = [];

        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = `[${timestamp}] ${msg}`;
            logs.push(entry);
            logOutput.textContent = logs.join('\n');
            logOutput.scrollTop = logOutput.scrollHeight;
            console.log(msg);
        }

        async function checkStatus() {
            const statusDiv = document.getElementById('status');
            
            try {
                log('Checking server...', 'info');
                
                // Check if main app HTML loads
                const response = await fetch('/');
                log(`Server response: ${response.status} ${response.statusText}`, response.status === 200 ? 'success' : 'error');
                
                // Check assets
                const cssResp = await fetch('/assets/index-CA1emiRN.css');
                log(`CSS file: ${cssResp.status} (${cssResp.headers.get('content-type')})`, cssResp.status === 200 ? 'success' : 'error');
                
                // Check JS
                const jsResp = await fetch('/assets/index-CdNGau4_.js');
                log(`JS file: ${jsResp.status} (${jsResp.headers.get('content-type')})`, jsResp.status === 200 ? 'success' : 'error');
                
                // Browser info
                log(`Browser: ${navigator.userAgent}`, 'info');
                log(`Service Workers: ${(await navigator.serviceWorker.getRegistrations()).length}`, 'info');
                
                statusDiv.innerHTML = '<span class="success">✅ All systems operational</span>';
                
            } catch (err) {
                log(`ERROR: ${err.message}`, 'error');
                statusDiv.innerHTML = `<span class="error">❌ Error: ${err.message}</span>`;
            }
        }

        async function clearCache() {
            const result = document.getElementById('cache-result');
            
            try {
                log('Clearing Service Workers...', 'info');
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (const reg of registrations) {
                    await reg.unregister();
                    log(`Unregistered SW: ${reg.scope}`, 'success');
                }
                
                log('Clearing localStorage...', 'info');
                localStorage.clear();
                
                log('Clearing sessionStorage...', 'info');
                sessionStorage.clear();
                
                log('Clearing IndexedDB...', 'info');
                const dbs = await indexedDB.databases();
                for (const db of dbs) {
                    indexedDB.deleteDatabase(db.name);
                    log(`Deleted DB: ${db.name}`, 'success');
                }
                
                result.innerHTML = '<span class="success">✅ Cache cleared! Ready to reload.</span>';
                log('Cache cleanup complete', 'success');
                
            } catch (err) {
                log(`Cache error: ${err.message}`, 'error');
                result.innerHTML = `<span class="error">Error: ${err.message}</span>`;
            }
        }

        // Run on load
        window.addEventListener('load', () => {
            log('Debug console loaded', 'success');
            checkStatus();
        });

        // Capture console logs
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog(...args);
            log(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '), 'info');
        };
    </script>
</body>
</html>
