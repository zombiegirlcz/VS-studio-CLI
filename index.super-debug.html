<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUI Builder - SUPER DEBUG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111827;
            color: #e5e7eb;
            font-family: 'Courier New', monospace;
            padding: 20px;
            line-height: 1.5;
        }
        h1 { color: #3b82f6; margin-bottom: 20px; }
        .section { 
            background: #1f2937;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
        }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .info { color: #60a5fa; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            margin: 5px;
        }
        button:hover { background: #2563eb; }
        pre {
            background: #0f1419;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 11px;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .card { background: #0f1419; padding: 10px; border-radius: 4px; }
        iframe { width: 100%; height: 500px; border: 2px solid #3b82f6; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🔥 TUI BUILDER - SUPER DEBUG CONSOLE</h1>
    
    <div class="section">
        <h2>⚡ QUICK ACTIONS</h2>
        <button onclick="fullClear()">🧹 NUCLEAR CLEAR (All Cache + SW)</button>
        <button onclick="reloadApp()">🔄 Reload App</button>
        <button onclick="location.reload()">🔃 Reload This Page</button>
        <div id="action-status" style="margin-top: 10px;"></div>
    </div>

    <div class="section">
        <h2>🔍 SYSTEM INFO</h2>
        <div class="grid">
            <div class="card">
                <strong>Browser:</strong>
                <div id="browser-info"></div>
            </div>
            <div class="card">
                <strong>Network:</strong>
                <div id="network-info"></div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>📡 ASSET VERIFICATION</h2>
        <div id="assets-status"></div>
    </div>

    <div class="section">
        <h2>🛑 ERRORS & WARNINGS</h2>
        <pre id="error-log" style="max-height: 200px; overflow-y: auto;"></pre>
    </div>

    <div class="section">
        <h2>🌐 LIVE APP IFRAME</h2>
        <p>This is what the app should look like:</p>
        <iframe id="app-frame" src="/"></iframe>
        <div id="iframe-status" style="margin-top: 10px; padding: 10px; background: #0f1419; border-radius: 4px;"></div>
    </div>

    <div class="section">
        <h2>📊 DETAILED CHECKS</h2>
        <button onclick="detailedCheck()">Run Full Diagnostics</button>
        <pre id="detailed-output" style="max-height: 300px; overflow-y: auto;"></pre>
    </div>

    <script>
        const errorLog = document.getElementById('error-log');
        const errors = [];

        // Capture ALL errors
        window.addEventListener('error', e => {
            const msg = `[ERROR] ${e.message} at ${e.filename}:${e.lineno}`;
            errors.push(msg);
            updateLog();
        });

        window.addEventListener('unhandledrejection', e => {
            const msg = `[REJECTION] ${e.reason}`;
            errors.push(msg);
            updateLog();
        });

        const originalLog = console.log;
        const originalError = console.error;
        console.log = (...args) => {
            originalLog(...args);
            errors.push('[LOG] ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
            updateLog();
        };
        console.error = (...args) => {
            originalError(...args);
            errors.push('[ERROR] ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
            updateLog();
        };

        function updateLog() {
            errorLog.textContent = errors.slice(-20).join('\n');
            errorLog.scrollTop = errorLog.scrollHeight;
        }

        async function fullClear() {
            const status = document.getElementById('action-status');
            try {
                // Clear Service Workers
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const reg of regs) {
                    await reg.unregister();
                }
                
                // Clear storage
                localStorage.clear();
                sessionStorage.clear();
                
                // Clear IndexedDB
                const dbs = await indexedDB.databases();
                for (const db of dbs) {
                    indexedDB.deleteDatabase(db.name);
                }
                
                status.innerHTML = '<span class="success">✅ CLEAR COMPLETE - Now reload the app!</span>';
                
            } catch(e) {
                status.innerHTML = `<span class="error">❌ Error: ${e.message}</span>`;
            }
        }

        function reloadApp() {
            document.getElementById('app-frame').src = '/';
            document.getElementById('iframe-status').innerHTML = '⏳ Loading...';
            
            setTimeout(() => {
                try {
                    const frame = document.getElementById('app-frame');
                    const doc = frame.contentDocument;
                    if (doc && doc.getElementById('root')?.innerHTML?.length > 50) {
                        document.getElementById('iframe-status').innerHTML = '<span class="success">✅ APP LOADED</span>';
                    } else {
                        document.getElementById('iframe-status').innerHTML = '<span class="error">❌ APP NOT RENDERING</span>';
                    }
                } catch(e) {
                    document.getElementById('iframe-status').innerHTML = '<span class="warning">⚠️ Cannot read iframe (might be OK)</span>';
                }
            }, 3000);
        }

        async function detailedCheck() {
            const output = document.getElementById('detailed-output');
            const lines = [];

            // Check root
            const root = document.getElementById('root');
            lines.push('ROOT ELEMENT: ' + (root ? '✓ EXISTS' : '✗ MISSING'));

            // Check scripts
            const scripts = Array.from(document.scripts);
            lines.push('SCRIPTS: ' + scripts.length + ' loaded');
            scripts.slice(0, 3).forEach(s => lines.push('  - ' + (s.src || s.innerText.substring(0, 30))));

            // Check stylesheets
            const sheets = Array.from(document.styleSheets);
            lines.push('STYLESHEETS: ' + sheets.length);
            sheets.forEach(s => lines.push('  - ' + (s.href || 'inline')));

            // Check network
            lines.push('\nNETWORK CHECKS:');
            try {
                const htmlResp = await fetch('/');
                lines.push(`  HTML: ${htmlResp.status} ${htmlResp.statusText}`);
                
                const cssResp = await fetch('/assets/index-CA1emiRN.css');
                lines.push(`  CSS: ${cssResp.status} ${cssResp.statusText}`);
                
                const jsResp = await fetch('/assets/index-CdNGau4_.js');
                lines.push(`  JS: ${jsResp.status} ${jsResp.statusText}`);
            } catch(e) {
                lines.push(`  FETCH ERROR: ${e.message}`);
            }

            output.textContent = lines.join('\n');
        }

        // Init on load
        window.addEventListener('load', () => {
            document.getElementById('browser-info').innerHTML = navigator.userAgent;
            document.getElementById('network-info').innerHTML = 
                'Type: ' + (navigator.connection?.effectiveType || 'unknown') + '<br>' +
                'Online: ' + (navigator.onLine ? 'YES' : 'NO');

            detailedCheck();
        });

        // Errors every 2s
        setInterval(updateLog, 2000);
    </script>
</body>
</html>
